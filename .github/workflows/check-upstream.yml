name: Check upstream for updates

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1,3,5" # 06:30 Mon, Wed, Fri

env:
  GH_APP_ID: 3107882
  UPSTREAM_OWNER: garethgeorge
  UPSTREAM_REPO: backrest
  VERSION_FOLDER: versions
  VERSION_FILE: VERSION_FILE.txt
  BRANCH_PREFIX_UPDATE: update/

jobs:
  fetch-releases:
    name: Fetch latest upstream releases
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions: {}

    outputs:
      versions: ${{ steps.collect.outputs.versions }}

    steps:
      - name: Get latest 5 upstream releases
        id: collect
        uses: actions/github-script@v8
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: process.env.UPSTREAM_OWNER,
              repo: process.env.UPSTREAM_REPO,
              per_page: 5,
            });

            const tags = releases.data.map(r => r.tag_name);

            core.info(`Found upstream releases: ${tags.join(", ")}`);
            core.setOutput("versions", JSON.stringify(tags));

  process-version:
    name: Process version ${{ matrix.version }}
    needs: fetch-releases
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      pull-requests: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.fetch-releases.outputs.versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Check if tag or version file already exists
        id: repocheck
        run: |
          if [ git rev-parse "${{ matrix.version }}" >/dev/null 2>&1 ] || \
             [ -f "${{ env.VERSION_FOLDER }}/${{ matrix.version }}.txt" ]
          then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if PR already exists
        id: prcheck
        if: steps.repocheck.outputs.exists == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const version = "${{ matrix.version }}";
            const branch = `${process.env.BRANCH_PREFIX_UPDATE}${version}`;

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: `${context.repo.owner}:${branch}`,
              per_page: 100,
            });

            core.info(`Found ${prs.data.length} open pull requests`);
            core.setOutput("exists", prs.data.length > 0 ? "true" : "false");

      - name: Check if upstream container image exists
        id: imagecheck
        if: steps.prcheck.outputs.exists == 'false'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = process.env.UPSTREAM_OWNER;
            const pkg = process.env.UPSTREAM_REPO;
            const tag = "${{ matrix.version }}";

            const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
              username: owner,
              package_type: "container",
              package_name: pkg,
              per_page: 100,
            });

            const found = versions.data.some(v =>
              v.metadata?.container?.tags?.includes(tag)
            );

            if (!found) {
              core.info(`No container image found for tag ${tag}`);
              core.setOutput("exists", "false");
            } else {
              core.info(`Container image found for tag ${tag}`);
              core.setOutput("exists", "true");
            }

      - name: Create GitHub App Token
        if: steps.imagecheck.outputs.exists == 'true'
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_SECRET }}

      - name: Configure git
        if: steps.imagecheck.outputs.exists == 'true'
        run: |
          user_name="${{ steps.app-token.outputs.app-slug }}[bot]"
          user_id="$(gh api "/users/${user_name}" --jq .id)"
          user_email="${user_id}+${user_name}@users.noreply.github.com"

          git config user.name "$user_name"
          git config user.email "$user_email"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create pr branch and commit version file
        if: steps.imagecheck.outputs.exists == 'true'
        run: |
          VERSION="${{ matrix.version }}"
          VERSION_FILE="${{ env.VERSION_FOLDER }}/${VERSION}.txt"
          BRANCH_UPDATE="${BRANCH_PREFIX_UPDATE}${VERSION}"

          git switch -c "$BRANCH_UPDATE"
          echo "" > "$VERSION_FILE"

          git add "$VERSION_FILE"
          git commit -m "Add upstream backrest ${VERSION}"
          git push -u origin "$BRANCH_UPDATE"

      - name: Create Pull Request
        if: steps.imagecheck.outputs.exists == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const version = "${{ matrix.version }}";
            const branch_update = `${process.env.BRANCH_PREFIX_UPDATE}${version}`;

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: update upstream to ${version}`,
              head: branch_update,
              base: "${{ github.ref_name }}",
              body: [
                `Automated upstream update.`,
                ``,
                `- Upstream repo: ${process.env.UPSTREAM_OWNER}/${process.env.UPSTREAM_REPO}`,
                `- Version: ${version}`,
                ``,
                `This PR updates the tracked upstream version and will trigger a full build & release once merged.`
              ].join("\n")
            });
